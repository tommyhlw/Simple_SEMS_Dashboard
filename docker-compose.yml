version: '3.8'

services:
  sems:
    build: .
    image: sems-viewer:latest
    env_file:
      - .env
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
