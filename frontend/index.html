<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power Curve</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background:#fafafa; }
      .container { max-width:1000px; margin:0 auto; padding:6px; }
      #chart-container { width: 100%; }
      #current-values{max-width:1000px;margin:12px auto 0}
      .metric { border-left:6px solid transparent; }
      .metric .icon{width:28px;text-align:center}
      button{background:#0366d6;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
      button.secondary{background:#6c757d}
      @media (max-width:700px){
        body{margin:12px}
        .metric{width:100%}
        .metric div{display:block}
        .container { padding:4px }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h2 id="page-title" style="margin:0">Power Curve</h2>
        <label for="todayDate">Select Date:</label>
        <input type="date" id="todayDate">
        <div style="margin-left:auto;display:flex;gap:8px">
          <button id="refresh-btn">Refresh</button>
          <button id="export-csv">Export CSV</button>
          </div>
      </div>
    </div>
    <div id="current-values" style="margin-top:12px; display:flex; gap:12px; align-items:center;">
      <div class="metric" id="m-pv" style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px">
        <div class="icon" style="font-size:20px">🌞</div>
        <div><div style="font-size:12px;color:#666">PV</div><div id="val-pv" style="font-weight:600">— kW</div></div>
      </div>
      <div class="metric" id="m-meter" style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px">
        <div class="icon" style="font-size:20px">🏭</div>
        <div>
          <div style="font-size:12px;color:#666">Zähler</div>
          <div id="val-meter" style="font-weight:600">— kW</div>
          <div id="meter-status" style="font-size:12px;color:#666;margin-top:4px">😕 —</div>
        </div>
      </div>
      <div class="metric" id="m-house" style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #eee;border-radius:6px">
        <div class="icon" style="font-size:20px">🏠</div>
        <div><div style="font-size:12px;color:#666">Haus</div><div id="val-house" style="font-weight:600">— kW</div></div>
      </div>
      <div style="margin-left:auto;color:#666;font-size:13px" id="val-time">—</div>
    </div>
    <div class="container">
      <div id="text-chart-container" style="display:none">
         <span>negativer Zähler Wert sad smiley, postiver wert happy smiley</span>
      </div>
    </div>
    <div class="container">
      <div id="chart-container">
        <canvas id="pvChart"></canvas>
      </div>
    </div>
    

    <script>

      async function loadPC(date = today) {
        const base = window.location.origin;
        const url = base + '/api/pc_all?target_date=' + date;
        //  console.log('fetching', url);
        // example call for date   /api/pc_all?target_date=2026-05-03
        //console.log(url);
        // fetch pv (required)
        const r1 = await fetch(url);
        if (!r1.ok) {
          const txt = await r1.text();
          console.error('PCurve_Power fetch failed', r1.status, txt);
          throw new Error('PCurve_Power fetch failed: ' + r1.status + ' ' + txt);
        }
        const j1 = await r1.json();  
        // console.log('PCurve_Power data', j1);
        return { j1 };
      }

      function createChart(ctxEl, labels, datasets, opts={}) {
        const ctx = ctxEl.getContext('2d');
        // ensure datasets have no visible points and are slightly smoothed
        datasets.forEach(d => { d.pointRadius = 0; d.tension = (d.tension === undefined) ? 0.32 : d.tension; d.pointHoverRadius = d.pointHoverRadius || 4 });
        return new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: datasets
          },
          options: Object.assign({
            responsive: true,
            aspectRatio: opts.aspectRatio || (4/3),
            plugins: { legend: { position: 'top', labels: { font: { size: opts.legendFontSize || 11 }, boxWidth: opts.legendBoxWidth || 10 } } },
            elements: { point: { radius: 0 } },
            scales: {
              y: { title: { display: true, text: opts.yLabel || 'kW' } },
              x: { title: { display: true, text: 'Time' } }
            }
          }, opts.options || {})
        });
      }

      (async () => {
      let chart = null;
      let table, tbody;
      let lastSeries = { labels: [], pv: [], meter: [], house: [] };
      let showAll = false;
      let toggleBtn = null;

      function buildTable(labels, pvData, meterData, houseData) {
        lastSeries = { labels: labels.slice(), pv: pvData.slice(), meter: meterData.slice(), house: houseData.slice() };
        if (!table) {
          // controls above table
          const controls = document.createElement('div');
          controls.style.display = 'flex'; controls.style.justifyContent = 'flex-end'; controls.style.maxWidth = '900px'; controls.style.margin = '8px auto 0';
          toggleBtn = document.createElement('button'); toggleBtn.className = 'secondary'; toggleBtn.textContent = 'Show all'; toggleBtn.style.marginRight = '8px';
          toggleBtn.addEventListener('click', () => { showAll = !showAll; toggleBtn.textContent = showAll ? 'Show last 10' : 'Show all'; buildTable(lastSeries.labels, lastSeries.pv, lastSeries.meter, lastSeries.house); });
          controls.appendChild(toggleBtn);
          document.body.appendChild(controls);

          table = document.createElement('table');
          table.style.borderCollapse = 'collapse';
          table.style.marginTop = '6px';
          table.style.maxWidth = '900px';
          table.innerHTML = '<thead><tr><th style="border:1px solid #ccc;padding:6px">Time</th><th style="border:1px solid #ccc;padding:6px">PV (kW)</th><th style="border:1px solid #ccc;padding:6px">Meter (kW)</th><th style="border:1px solid #ccc;padding:6px">House (kW)</th></tr></thead>';
          tbody = document.createElement('tbody');
          table.appendChild(tbody);
          document.body.appendChild(table);
        }
        // clear tbody
        tbody.innerHTML = '';
        const start = showAll ? 0 : Math.max(0, labels.length - 10);
        // determine column colors from chart datasets (fallback to defaults)
        const pvColor = (chart && chart.data && chart.data.datasets[0] && chart.data.datasets[0].borderColor) ? chart.data.datasets[0].borderColor : '#03bbd6';
        const meterColor = (chart && chart.data && chart.data.datasets[1] && chart.data.datasets[1].borderColor) ? chart.data.datasets[1].borderColor : '#fbb03b';
        const houseColor = (chart && chart.data && chart.data.datasets[2] && chart.data.datasets[2].borderColor) ? chart.data.datasets[2].borderColor : '#2ca02c';
        for (let i = start; i < labels.length; i++) {
          const tr = document.createElement('tr');
          const t1 = document.createElement('td'); t1.style.border='1px solid #eee'; t1.style.padding='6px'; t1.textContent = labels[i];
          const t2 = document.createElement('td'); t2.style.border='1px solid #eee'; t2.style.padding='6px'; t2.textContent = (pvData[i] != null) ? pvData[i] : '';
          const t3 = document.createElement('td'); t3.style.border='1px solid #eee'; t3.style.padding='6px'; t3.textContent = (meterData[i] != null) ? meterData[i] : '';
          const t4 = document.createElement('td'); t4.style.border='1px solid #eee'; t4.style.padding='6px'; t4.textContent = (houseData[i] != null) ? houseData[i] : '';
          // color the value text to match the chart legend/dataset colors
          t2.style.color = pvColor;
          t3.style.color = meterColor;
          t4.style.color = houseColor;
          tr.appendChild(t1); tr.appendChild(t2); tr.appendChild(t3); tr.appendChild(t4);
          tbody.appendChild(tr);
        }
      }

      async function refreshAndRender(date) {
        try {
          const json = await loadPC(date);
          let labels = json.j1.pv.labels || [];      
          let pvData = json.j1.pv.data || [];     
          let meterData = json.j1.meter.data || [];
          let houseData = json.j1.house.data || [];    
          //console.log('loaded data', { pvData, meterData, houseData, json });
          // console.log('current from series', { pv: (pvData.length > 0) ? pvData[pvData.length - 1] : null, meter: (meterData.length > 0) ? meterData[meterData.length - 1] : null, house: (houseData.length > 0) ? houseData[houseData.length - 1] : null });
          //let meterData = (json.pc_meter && Array.isArray(json.pc_meter.data)) ? json.pc_meter.data : new Array(labels.length).fill(null);
          // compute house client-side: pv - meter, negative values shown as empty (null)
          //let houseData = new Array(labels.length).fill(null);
          const now = json.pc_now || null;

          // If series are empty but /api/pc_now provides current values, use it as a single-point series
          if ((labels.length === 0 || pvData.length === 0) && now && now.Uhrzeit) {
            const t = now.Uhrzeit;
            const p = (now['PV-Strom'] !== undefined) ? now['PV-Strom'] : null;
            const m = (now['Netzeinspeisung/-Bezug'] !== undefined) ? now['Netzeinspeisung/-Bezug'] : null;
            labels.splice(0, labels.length, t);
            pvData = [p];
            meterData = [m];
            houseData = [ (p != null && m != null && (p - m) >= 0) ? Math.round((p - m) * 1000) / 1000 : null ];
          } else {
            // compute from series (align by index of pv labels)
            for (let i = 0; i < labels.length; i++) {
              const p = (pvData && i < pvData.length) ? pvData[i] : null;
              const m = (meterData && i < meterData.length) ? meterData[i] : null;
              if (p == null || m == null) {
                houseData[i] = null;
              } else {
                const h = Math.round((p - m) * 1000) / 1000;
                houseData[i] = (h < 0) ? null : h;
              }
            }
          }

          if (!chart) {
            const ds = [
              // swapped colors: PV uses meter color, Meter uses pv color
              { label: 'PV (kW)', data: pvData, borderColor: '#fbb03b', backgroundColor: 'rgba(251,176,59,0.1)', fill: true },
              { label: 'Zähler (kW)', data: meterData, borderColor: '#03bbd6', backgroundColor: 'rgba(3,187,214,0.1)', fill: false },
              { label: 'Haus (kW)', data: houseData, borderColor: '#2ca02c', backgroundColor: 'rgba(44,160,44,0.08)', fill: false }
            ];
            chart = createChart(document.getElementById('pvChart'), labels, ds, { yLabel: 'kW', aspectRatio: 4/3, legendFontSize: 11, legendBoxWidth: 10 });
          } else {
            chart.data.labels = labels;
            // update data and preserve visual settings
            const sets = [pvData, meterData, houseData];
            for (let i = 0; i < sets.length; i++) {
              if (!chart.data.datasets[i]) chart.data.datasets[i] = {};
              chart.data.datasets[i].data = sets[i];
              chart.data.datasets[i].pointRadius = 0;
              chart.data.datasets[i].tension = 0.32;
              chart.data.datasets[i].pointHoverRadius = 4;
            }
            chart.update();
          }

          buildTable(labels, pvData, meterData, houseData);
          renderCurrentFromSeries(labels, pvData, meterData, houseData);
        } catch (e) {
          console.warn('refresh failed', e);
        }
      }

      function renderCurrentFromSeries(labels, pvData, meterData, houseData) {
        if (!labels || labels.length === 0) return;
        const last = labels.length - 1;
        const time = labels[last];
        const pv = (pvData && pvData.length > last) ? pvData[last] : null;
        const meter = (meterData && meterData.length > last) ? meterData[last] : null;
        const house = (houseData && houseData.length > last) ? houseData[last] : null;

        document.getElementById('val-pv').textContent = (pv != null) ? pv + ' kW' : '—';
        document.getElementById('val-meter').textContent = (meter != null) ? meter + ' kW' : '—';
        document.getElementById('val-house').textContent = (house != null) ? house + ' kW' : '—';
        document.getElementById('val-time').textContent = time || '—';
        // color metric boxes and value text to match chart dataset colors
        try {
          const pvCol = (chart && chart.data && chart.data.datasets[0] && chart.data.datasets[0].borderColor) ? chart.data.datasets[0].borderColor : '#03bbd6';
          const meterCol = (chart && chart.data && chart.data.datasets[1] && chart.data.datasets[1].borderColor) ? chart.data.datasets[1].borderColor : '#fbb03b';
          const houseCol = (chart && chart.data && chart.data.datasets[2] && chart.data.datasets[2].borderColor) ? chart.data.datasets[2].borderColor : '#2ca02c';
          const mPV = document.getElementById('m-pv'); if (mPV) { mPV.style.borderLeftColor = pvCol; document.getElementById('val-pv').style.color = pvCol; }
          const mMeter = document.getElementById('m-meter'); if (mMeter) { mMeter.style.borderLeftColor = meterCol; document.getElementById('val-meter').style.color = meterCol; }
          const mHouse = document.getElementById('m-house'); if (mHouse) { mHouse.style.borderLeftColor = houseCol; document.getElementById('val-house').style.color = houseCol; }
        } catch (ee) { /* ignore */ }
        // set meter status: positive = Netzeinspeisung (sunglasses), negative = Netzbezug (sad), zero/null = confused
        try {
          const statusEl = document.getElementById('meter-status');
          if (statusEl) {
            if (meter == null || meter === 0) {
              statusEl.textContent = '😕 Keine Einspeisung/Bezug';
              statusEl.style.color = '#6c757d';
            } else if (meter > 0) {
              statusEl.textContent = '😎 Netzeinspeisung';
              statusEl.style.color = '#198754';
            } else {
              statusEl.textContent = '😢 Netzbezug';
              statusEl.style.color = '#d9534f';
            }
          }
        } catch (e2) { /* ignore */ }
      }

      // 1. Define the input element variable first
      const dateInput = document.getElementById('todayDate');
      // 2. Get today's date properly as a string (YYYY-MM-DD)
      const today = new Date().toISOString().split('T')[0];
      // 3. Set the input's default value to today's date
      dateInput.value = today;
      // 4. Add the change event listener
      dateInput.addEventListener('change', (event) => {
        const selectedDate = event.target.value;        
        // 5. Call the function (Ensure this function exists in your script!)
        // console.log('Selected date:', selectedDate);
        refreshAndRender(dateInput.value)// trigger refresh for the selected date
         // Optionally, you can directly call the function if it accepts a date parameter:
          .then(data => {
            console.log('Data for selected date', data);
            // Add your chart/table update logic here
          })
          .catch(err => {
            console.error('Error loading data for selected date', err);
          });
      });
      
      // hook buttons
      const refreshBtn = document.getElementById('refresh-btn');
      if (refreshBtn) refreshBtn.addEventListener('click', () => refreshAndRender(today));
      if (refreshBtn) refreshBtn.addEventListener('click', () => dateInput.value = today);
      const exportBtn = document.getElementById('export-csv');
      if (exportBtn) exportBtn.addEventListener('click', () => exportCSV());

      // initial load
      await refreshAndRender(today);

      // update title time every second
      setInterval(() => { const el = document.getElementById('title-time'); if (el) el.textContent = new Date().toLocaleString(); }, 1000);

      // refresh every 5 minutes
      setInterval(refreshAndRender, 5 * 60 * 1000);

      // export CSV (all rows)
      function exportCSV() {
        const cols = ['Time','PV (kW)','Meter (kW)','House (kW)'];
        const rows = [cols];
        const { labels, pv, meter, house } = lastSeries;
        for (let i = 0; i < labels.length; i++) rows.push([labels[i] || '', pv[i] != null ? pv[i] : '', meter[i] != null ? meter[i] : '', house[i] != null ? house[i] : '']);
        const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'pc_values.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }
      })();

    </script>
  </body>
</html>
